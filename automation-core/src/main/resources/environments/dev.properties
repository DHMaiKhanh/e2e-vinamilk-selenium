# --- UI ---
ui.baseUrl=https://dev.vinamilk.com.vn
browser=chrome
browser.headless=false
selenium.grid.enabled=false
selenium.grid.url=http://localhost:4444/wd/hub

# --- API (per microservice) ---
api.user-service.baseUrl=https://dev-api.vinamilk.com.vn/user-service
api.product-service.baseUrl=https://dev-api.vinamilk.com.vn/product-service
api.order-service.baseUrl=https://dev-api.vinamilk.com.vn/order-service
api.payment-service.baseUrl=https://dev-api.vinamilk.com.vn/payment-service
api.auth.token=

# --- Kafka ---
kafka.bootstrap.servers=localhost:9092
kafka.topic.order-created=order-created-events
kafka.consumer.group=vinamilk-automation-dev

# --- WireMock ---
wiremock.port=8089
