# Production is read-only for automation: smoke/synthetic checks against
# real endpoints only, no write-flow (order/payment) tests should target
# this file. Credentials/tokens are injected by CI (-Dapi.auth.token=...),
# never committed here.

# --- UI ---
ui.baseUrl=https://www.vinamilk.com.vn
browser=chrome
browser.headless=true
selenium.grid.enabled=true
selenium.grid.url=http://selenium-hub:4444/wd/hub

# --- API (per microservice) ---
api.user-service.baseUrl=https://api.vinamilk.com.vn/user-service
api.product-service.baseUrl=https://api.vinamilk.com.vn/product-service
api.order-service.baseUrl=https://api.vinamilk.com.vn/order-service
api.payment-service.baseUrl=https://api.vinamilk.com.vn/payment-service
api.auth.token=

# --- Kafka ---
kafka.bootstrap.servers=kafka-prod.internal.vinamilk.com.vn:9092
kafka.topic.order-created=order-created-events
kafka.consumer.group=vinamilk-automation-prod-readonly

# --- WireMock ---
wiremock.port=8089
