# --- UI ---
ui.baseUrl=https://staging.vinamilk.com.vn
browser=chrome
browser.headless=true
selenium.grid.enabled=true
selenium.grid.url=http://selenium-hub:4444/wd/hub

# --- API (per microservice) ---
api.user-service.baseUrl=https://staging-api.vinamilk.com.vn/user-service
api.product-service.baseUrl=https://staging-api.vinamilk.com.vn/product-service
api.order-service.baseUrl=https://staging-api.vinamilk.com.vn/order-service
api.payment-service.baseUrl=https://staging-api.vinamilk.com.vn/payment-service
api.auth.token=

# --- Kafka ---
kafka.bootstrap.servers=kafka-staging.internal.vinamilk.com.vn:9092
kafka.topic.order-created=order-created-events
kafka.consumer.group=vinamilk-automation-staging

# --- WireMock ---
wiremock.port=8089
